rules:
  - id: "TRAVERSAL-001"
    name: "Path Traversal"
    description: "Detects directory traversal attempts"
    severity: "high"
    enabled: true
    match_locations: ["url", "path", "query"]
    patterns:
      - "(\\.\\./|\\.\\.\\\\)"
      - "(%2e%2e%2f|%2e%2e/|%2e%2e\\\\)"
      - "(?i)(/etc/(passwd|shadow|hosts|issue))"
      - "(?i)(/proc/self/)"
      - "(?i)(/proc/version)"
      - "(?i)(c:\\\\windows\\\\)"

  - id: "TRAVERSAL-002"
    name: "Path Traversal - Encoded and Windows Targets"
    description: "Detects encoded traversal and sensitive Windows file targets"
    severity: "high"
    enabled: true
    match_locations: ["url", "path", "query", "body"]
    patterns:
      - "(?i)(\\.\\.%2f|%2e%2e%5c|%252e%252e%252f|%c0%ae%c0%ae)"
      - "(?i)(/var/log/|/var/www/|/usr/local/|/opt/|/home/[^/]+/\\.ssh/)"
      - "(?i)(boot\\.ini|win\\.ini|system32\\\\drivers\\\\etc\\\\hosts)"
      - "(?i)(WEB-INF/web\\.xml|META-INF/MANIFEST\\.MF)"
